apiVersion: v1
kind: Service
metadata:
  name: {{ include "sitecrawl.fullname" . }}-playwright
spec:
  type: {{ .Values.service.playwright.type }}
  selector:
    app: {{ include "sitecrawl.name" . }}-playwright
  ports:
    - protocol: TCP
      port: {{ .Values.service.playwright.port }}
      targetPort: {{ .Values.service.playwright.port }}
