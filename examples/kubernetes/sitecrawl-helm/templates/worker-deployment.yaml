apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sitecrawl.fullname" . }}-worker
  labels:
    app: {{ include "sitecrawl.name" . }}-worker
spec:
  replicas: {{ .Values.worker.replicaCount | default .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "sitecrawl.name" . }}-worker
  template:
    metadata:
      labels:
        app: {{ include "sitecrawl.name" . }}-worker
    spec:
      {{- if .Values.image.dockerSecretEnabled }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [ "node" ]
          args: [ "--max-old-space-size=3072", "dist/src/services/queue-worker.js" ]
          ports:
            - containerPort: {{ .Values.worker.port | int }}
          env:
            - name: FLY_PROCESS_GROUP
              value: "worker"
            - name: WORKER_PORT
              value: {{ .Values.worker.port | quote }}
            - name: NUQ_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "sitecrawl.fullname" . }}-config
            - secretRef:
                name: {{ include "sitecrawl.fullname" . }}-secret
          {{- if and .Values.resources.enabled .Values.worker.resources }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /liveness
              port: {{ .Values.worker.port | int }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
