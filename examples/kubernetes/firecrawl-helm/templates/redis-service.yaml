apiVersion: v1
kind: Service
metadata:
  name: {{ include "sitecrawl.fullname" . }}-redis
spec:
  type: {{ .Values.service.redis.type }}
  selector:
    app: {{ include "sitecrawl.name" . }}-redis
  ports:
    - protocol: TCP
      port: {{ .Values.service.redis.port }}
      targetPort: {{ .Values.service.redis.port }}
