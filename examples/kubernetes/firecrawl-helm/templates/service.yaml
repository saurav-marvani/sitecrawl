apiVersion: v1
kind: Service
metadata:
  name: {{ include "sitecrawl.fullname" . }}-api
spec:
  type: {{ .Values.service.api.type }}
  selector:
    app: {{ include "sitecrawl.name" . }}-api
  ports:
    - protocol: TCP
      port: {{ .Values.service.api.port }}
      targetPort: {{ .Values.service.api.port }}
